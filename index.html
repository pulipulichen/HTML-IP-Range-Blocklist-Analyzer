<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 清單分析工具</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="assets/favicon/favicon.png">
    <link rel="icon" type="image/png" href="assets/favicon/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        <header class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800">IP 清單分析與自動分組工具</h1>
            <p class="text-gray-500 text-sm mt-1">分析可疑 IP，自動補全國家資訊 (失敗自動重試)，並排除台灣 IP。</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 輸入區：可疑清單 -->
            <div class="space-y-2 flex flex-col">
                <label class="block text-sm font-medium text-gray-700">1. 輸入可疑清單 (New Suspects)</label>
                <textarea id="suspectInput" class="w-full h-48 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="183.131.117.0/24  'group_183_131_117';  # Freq: 53 ..."></textarea>
                
                <!-- 手動查詢快捷連結區 -->
                <div class="mt-3">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">手動檢查細節 (BrowserLeaks - 已排序):</span>
                    <div id="manualCheckLinks" class="mt-2 flex flex-wrap gap-2 max-h-32 overflow-y-auto p-2 border border-dashed border-gray-300 rounded-lg bg-gray-50 custom-scrollbar">
                        <span class="text-xs text-gray-400 italic">輸入 IP 後將在此顯示快捷連結...</span>
                    </div>
                </div>
            </div>

            <!-- 輸入區：已設定清單 -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">2. 已設定的清單 (Configured List)</label>
                <textarea id="configInput" class="w-full h-[324px] p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="原本的設定會自動記錄於此..."></textarea>
            </div>
        </div>

        <div class="flex flex-col items-center space-y-4">
            <button id="runAnalysis" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-10 rounded-full shadow-lg transition duration-200 transform hover:scale-105 active:scale-95 disabled:opacity-50">
                執行分析與合併
            </button>
            <div id="progressBarContainer" class="hidden w-full max-w-md bg-gray-200 rounded-full h-2.5">
                <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <!-- 狀態顯示 -->
        <div id="statusBox" class="hidden p-4 rounded-lg text-sm font-medium"></div>

        <!-- 結果區 -->
        <div class="space-y-4">
            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-medium text-gray-700">分析結果 (更新後的已設定清單 - 可編輯)</label>
                    <div class="space-x-4">
                        <span id="unknownCounter" class="text-xs font-bold text-orange-600"></span>
                        <button onclick="copyResult()" class="text-blue-600 hover:underline text-sm font-bold">複製結果</button>
                    </div>
                </div>
                <textarea id="outputResult" class="w-full h-64 p-3 border rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none text-xs custom-scrollbar" placeholder="結果將顯示於此..."></textarea>
            </div>

            <!-- Unknown IP 專屬查詢按鈕區 -->
            <div id="unknownSection" class="hidden space-y-2 p-4 bg-orange-50 border border-orange-200 rounded-xl">
                <h3 class="text-sm font-bold text-orange-800 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    待處理 Unknown 手動查詢 (點擊後會變色)
                </h3>
                <div id="unknownIpButtons" class="flex flex-wrap gap-2">
                    <!-- 動態插入 Unknown IP 按鈕 -->
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="ui.js"></script>
    <script src="api.js"></script>
    <script src="main.js"></script>
    <script>
        if (false && 'serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
